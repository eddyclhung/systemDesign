nchor=\"middle\" font-weight=\"600\">ACID Transaction</text><text x=\"478\" y=\"80\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">DB + outbox row</text>\n<rect x=\"544\" y=\"58\" width=\"116\" height=\"22\" rx=\"3\" fill=\"#21262D\" stroke=\"#D29922\"/><text x=\"602\" y=\"73\" fill=\"#D29922\" font-size=\"9\" text-anchor=\"middle\">Outbox Worker</text>\n<line x1=\"415\" y1=\"69\" x2=\"426\" y2=\"69\" stroke=\"#3FB950\" stroke-width=\"1.5\" marker-end=\"url(#b2)\"/>\n<line x1=\"528\" y1=\"69\" x2=\"542\" y2=\"69\" stroke=\"#D29922\" stroke-width=\"1.5\" marker-end=\"url(#b3)\"/>\n<text x=\"500\" y=\"100\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">polls PENDING \u2192 publish to Kafka \u2192 marks PROCESSED</text>\n<rect x=\"10\" y=\"130\" width=\"660\" height=\"34\" rx=\"4\" fill=\"#21262D\"/>\n<text x=\"340\" y=\"146\" fill=\"#8B949E\" font-size=\"10\" text-anchor=\"middle\">Outbox delivers at-least-once \u2192 consumer must be idempotent. Cleanup: delete PROCESSED rows older than 7 days.</text>\n<text x=\"340\" y=\"159\" fill=\"#D29922\" font-size=\"9\" text-anchor=\"middle\">CDC alternative (Debezium): reads PostgreSQL WAL directly \u2014 zero app changes, but monitor replication slot lag as P1 metric.</text>\n<defs>\n<marker id=\"b1\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#F85149\"/></marker>\n<marker id=\"b2\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#3FB950\"/></marker>\n<marker id=\"b3\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#D29922\"/></marker>\n</defs>\n</svg>"}], "kafka": [{"title": "Kafka high throughput \u2014 four key mechanisms", "svg": "<svg viewBox=\"0 0 680 190\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Inter,monospace\">\n<rect width=\"680\" height=\"190\" fill=\"#0D1117\" rx=\"8\"/>\n<text x=\"340\" y=\"20\" fill=\"#8B949E\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"600\">Kafka High Throughput \u2014 Four Key Mechanisms</text>\n<rect x=\"10\" y=\"30\" width=\"150\" height=\"96\" rx=\"6\" fill=\"#161B22\" stroke=\"#2F81F7\"/>\n<text x=\"85\" y=\"48\" fill=\"#2F81F7\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Sequential Writes</text>\n<text x=\"85\" y=\"64\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">Append-only log</text>\n<text x=\"85\" y=\"79\" fill=\"#3FB950\" font-size=\"11\" text-anchor=\"middle\">~500 MB/s seq</text>\n<text x=\"85\" y=\"94\" fill=\"#F85149\" font-size=\"11\" text-anchor=\"middle\">~50 MB/s random</text>\n<text x=\"85\" y=\"110\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">10-100x faster I/O</text>\n<rect x=\"178\" y=\"30\" width=\"150\" height=\"96\" rx=\"6\" fill=\"#161B22\" stroke=\"#3FB950\"/>\n<text x=\"253\" y=\"48\" fill=\"#3FB950\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Zero-Copy</text>\n<text x=\"253\" y=\"64\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">OS sendfile() syscall</text>\n<text x=\"253\" y=\"79\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">page cache \u2192 NIC</text>\n<text x=\"253\" y=\"94\" fill=\"#3FB950\" font-size=\"11\" text-anchor=\"middle\">60-70% less CPU</text>\n<text x=\"253\" y=\"110\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">no user-space copy</text>\n<rect x=\"346\" y=\"30\" width=\"150\" height=\"96\" rx=\"6\" fill=\"#161B22\" stroke=\"#D29922\"/>\n<text x=\"421\" y=\"48\" fill=\"#D29922\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Batching</text>\n<text x=\"421\" y=\"64\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">batch.size + linger.ms</text>\n<text x=\"421\" y=\"79\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">compress per batch</text>\n<text x=\"421\" y=\"94\" fill=\"#D29922\" font-size=\"10\" text-anchor=\"middle\">lz4 / zstd</text>\n<text x=\"421\" y=\"110\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">amortize per-msg cost</text>\n<rect x=\"514\" y=\"30\" width=\"156\" height=\"96\" rx=\"6\" fill=\"#161B22\" stroke=\"#BC8CFF\"/>\n<text x=\"592\" y=\"48\" fill=\"#BC8CFF\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Partitioning</text>\n<text x=\"592\" y=\"64\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">N partitions \u00d7 M brokers</text>\n<text x=\"592\" y=\"79\" fill=\"#BC8CFF\" font-size=\"11\" text-anchor=\"middle\">linear scale</text>\n<text x=\"592\" y=\"94\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">1 partition = 1 consumer</text>\n<text x=\"592\" y=\"110\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">can't reduce later</text>\n<rect x=\"10\" y=\"140\" width=\"660\" height=\"40\" rx=\"4\" fill=\"#161B22\" stroke=\"#3FB950\"/>\n<text x=\"340\" y=\"158\" fill=\"#3FB950\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Result: millions of messages/sec per cluster</text>\n<text x=\"340\" y=\"173\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">Page cache tip: give brokers max RAM for OS cache (not JVM heap). Producers write to cache \u2192 recent consumers read from cache = near-zero disk I/O.</text>\n</svg>"}, {"title": "ISR and broker failure \u2014 acks=all durability model", "svg": "<svg viewBox=\"0 0 680 195\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Inter,monospace\">\n<rect width=\"680\" height=\"195\" fill=\"#0D1117\" rx=\"8\"/>\n<text x=\"340\" y=\"20\" fill=\"#8B949E\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"600\">Kafka ISR \u2014 Broker Failure Without Data Loss</text>\n<rect x=\"10\" y=\"35\" width=\"80\" height=\"28\" rx=\"4\" fill=\"#161B22\" stroke=\"#3FB950\"/><text x=\"50\" y=\"53\" fill=\"#3FB950\" font-size=\"10\" text-anchor=\"middle\">Producer</text>\n<rect x=\"125\" y=\"28\" width=\"115\" height=\"50\" rx=\"4\" fill=\"#161B22\" stroke=\"#2F81F7\" stroke-width=\"2\"/>\n<text x=\"182\" y=\"46\" fill=\"#2F81F7\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">Leader (Broker 1)</text>\n<text x=\"182\" y=\"60\" fill=\"#3FB950\" font-size=\"9\" text-anchor=\"middle\">ISR member \u2713</text>\n<text x=\"182\" y=\"73\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">offset 102 \u2713</text>\n<rect x=\"280\" y=\"28\" width=\"115\" height=\"50\" rx=\"4\" fill=\"#161B22\" stroke=\"#3FB950\"/>\n<text x=\"337\" y=\"46\" fill=\"#3FB950\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">Follower (Broker 2)</text>\n<text x=\"337\" y=\"60\" fill=\"#3FB950\" font-size=\"9\" text-anchor=\"middle\">ISR member \u2713</text>\n<text x=\"337\" y=\"73\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">offset 102 \u2713</text>\n<rect x=\"435\" y=\"28\" width=\"115\" height=\"50\" rx=\"4\" fill=\"#161B22\" stroke=\"#F85149\"/>\n<text x=\"492\" y=\"46\" fill=\"#F85149\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">Follower (Broker 3)</text>\n<text x=\"492\" y=\"60\" fill=\"#F85149\" font-size=\"9\" text-anchor=\"middle\">NOT in ISR \u2717</text>\n<text x=\"492\" y=\"73\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">offset 100 (lagging)</text>\n<line x1=\"90\" y1=\"49\" x2=\"123\" y2=\"49\" stroke=\"#2F81F7\" stroke-width=\"1.5\" marker-end=\"url(#k1)\"/>\n<line x1=\"240\" y1=\"49\" x2=\"278\" y2=\"49\" stroke=\"#3FB950\" stroke-width=\"1.5\" marker-end=\"url(#k2)\"/>\n<line x1=\"240\" y1=\"53\" x2=\"433\" y2=\"53\" stroke=\"#F85149\" stroke-width=\"1\" stroke-dasharray=\"4,3\" marker-end=\"url(#k3)\"/>\n<text x=\"340\" y=\"100\" fill=\"#D29922\" font-size=\"10\" text-anchor=\"middle\">acks=all waits for ALL ISR members before acking producer</text>\n<text x=\"340\" y=\"115\" fill=\"#8B949E\" font-size=\"10\" text-anchor=\"middle\">Broker 1 fails \u2192 controller elects Broker 2 (ISR) as leader \u2192 no data loss \u2713</text>\n<text x=\"340\" y=\"130\" fill=\"#F85149\" font-size=\"10\" text-anchor=\"middle\">ISR shrinks to 1 + min.insync.replicas=2 \u2192 NotEnoughReplicasException (blocks produce) \u2713</text>\n<rect x=\"10\" y=\"148\" width=\"325\" height=\"36\" rx=\"4\" fill=\"#161B22\" stroke=\"#3FB950\"/>\n<text x=\"172\" y=\"165\" fill=\"#3FB950\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">acks=all + min.insync.replicas=2</text>\n<text x=\"172\" y=\"179\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">~1-5ms latency cost \u00b7 survives single broker failure</text>\n<rect x=\"345\" y=\"148\" width=\"325\" height=\"36\" rx=\"4\" fill=\"#161B22\" stroke=\"#F85149\"/>\n<text x=\"507\" y=\"165\" fill=\"#F85149\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">Unclean leader election (avoid!)</text>\n<text x=\"507\" y=\"179\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">elects out-of-ISR replica \u2192 silent data loss</text>\n<defs>\n<marker id=\"k1\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#2F81F7\"/></marker>\n<marker id=\"k2\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#3FB950\"/></marker>\n<marker id=\"k3\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#F85149\"/></marker>\n</defs>\n</svg>"}], "patterns": [{"title": "Kafka vs SQS \u2014 decision matrix", "svg": "<svg viewBox=\"0 0 680 210\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Inter,monospace\">\n<rect width=\"680\" height=\"210\" fill=\"#0D1117\" rx=\"8\"/>\n<text x=\"340\" y=\"20\" fill=\"#8B949E\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"600\">Kafka vs SQS \u2014 Decision Matrix</text>\n<rect x=\"10\" y=\"30\" width=\"240\" height=\"24\" rx=\"3\" fill=\"#21262D\"/><text x=\"130\" y=\"46\" fill=\"#8B949E\" font-size=\"10\" text-anchor=\"middle\">Criterion</text>\n<rect x=\"256\" y=\"30\" width=\"200\" height=\"24\" rx=\"3\" fill=\"#21262D\" stroke=\"#2F81F7\"/><text x=\"356\" y=\"46\" fill=\"#2F81F7\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">Kafka</text>\n<rect x=\"462\" y=\"30\" width=\"208\" height=\"24\" rx=\"3\" fill=\"#21262D\" stroke=\"#D29922\"/><text x=\"566\" y=\"46\" fill=\"#D29922\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">SQS</text>\n<rect x=\"10\" y=\"58\" width=\"240\" height=\"22\" rx=\"2\" fill=\"#161B22\"/><text x=\"130\" y=\"73\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">Message replay</text>\n<rect x=\"256\" y=\"58\" width=\"200\" height=\"22\" rx=\"2\" fill=\"#0D3F1F\"/><text x=\"356\" y=\"73\" fill=\"#3FB950\" font-size=\"9\" text-anchor=\"middle\">\u2713 retain + replay any offset</text>\n<rect x=\"462\" y=\"58\" width=\"208\" height=\"22\" rx=\"2\" fill=\"#3F1B1B\"/><text x=\"566\" y=\"73\" fill=\"#F85149\" font-size=\"9\" text-anchor=\"middle\">\u2717 deleted on consume</text>\n<rect x=\"10\" y=\"84\" width=\"240\" height=\"22\" rx=\"2\" fill=\"#161B22\"/><text x=\"130\" y=\"99\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">Multiple consumers</text>\n<rect x=\"256\" y=\"84\" width=\"200\" height=\"22\" rx=\"2\" fill=\"#0D3F1F\"/><text x=\"356\" y=\"99\" fill=\"#3FB950\" font-size=\"9\" text-anchor=\"middle\">\u2713 independent consumer groups</text>\n<rect x=\"462\" y=\"84\" width=\"208\" height=\"22\" rx=\"2\" fill=\"#21262D\"/><text x=\"566\" y=\"99\" fill=\"#D29922\" font-size=\"9\" text-anchor=\"middle\">Partial (SNS fan-out)</text>\n<rect x=\"10\" y=\"110\" width=\"240\" height=\"22\" rx=\"2\" fill=\"#161B22\"/><text x=\"130\" y=\"125\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">Ordering guarantee</text>\n<rect x=\"256\" y=\"110\" width=\"200\" height=\"22\" rx=\"2\" fill=\"#0D3F1F\"/><text x=\"356\" y=\"125\" fill=\"#3FB950\" font-size=\"9\" text-anchor=\"middle\">\u2713 per-partition key</text>\n<rect x=\"462\" y=\"110\" width=\"208\" height=\"22\" rx=\"2\" fill=\"#21262D\"/><text x=\"566\" y=\"125\" fill=\"#D29922\" font-size=\"9\" text-anchor=\"middle\">Per msg group (FIFO only)</text>\n<rect x=\"10\" y=\"136\" width=\"240\" height=\"22\" rx=\"2\" fill=\"#161B22\"/><text x=\"130\" y=\"151\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">Ops overhead</text>\n<rect x=\"256\" y=\"136\" width=\"200\" height=\"22\" rx=\"2\" fill=\"#3F1B1B\"/><text x=\"356\" y=\"151\" fill=\"#F85149\" font-size=\"9\" text-anchor=\"middle\">High (brokers, tuning)</text>\n<rect x=\"462\" y=\"136\" width=\"208\" height=\"22\" rx=\"2\" fill=\"#0D3F1F\"/><text x=\"566\" y=\"151\" fill=\"#3FB950\" font-size=\"9\" text-anchor=\"middle\">\u2713 zero (fully managed)</text>\n<rect x=\"10\" y=\"162\" width=\"240\" height=\"22\" rx=\"2\" fill=\"#161B22\"/><text x=\"130\" y=\"177\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">Throughput ceiling</text>\n<rect x=\"256\" y=\"162\" width=\"200\" height=\"22\" rx=\"2\" fill=\"#0D3F1F\"/><text x=\"356\" y=\"177\" fill=\"#3FB950\" font-size=\"9\" text-anchor=\"middle\">\u2713 millions/sec per cluster</text>\n<rect x=\"462\" y=\"162\" width=\"208\" height=\"22\" rx=\"2\" fill=\"#21262D\"/><text x=\"566\" y=\"177\" fill=\"#D29922\" font-size=\"9\" text-anchor=\"middle\">3K/s FIFO, unlimited Standard</text>\n<rect x=\"10\" y=\"190\" width=\"660\" height=\"16\" rx=\"3\" fill=\"#3F1B1B\" stroke=\"#F85149\" stroke-width=\"0.5\"/>\n<text x=\"340\" y=\"202\" fill=\"#F85149\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">Key decision: SQS has no replay. If ANY downstream needs event history \u2192 Kafka.</text>\n</svg>"}], "backpressure": [{"title": "Token bucket vs sliding window rate limiting", "svg": "<svg viewBox=\"0 0 680 200\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Inter,monospace\">\n<rect width=\"680\" height=\"200\" fill=\"#0D1117\" rx=\"8\"/>\n<text x=\"340\" y=\"20\" fill=\"#8B949E\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"600\">Rate Limiting \u2014 Token Bucket vs Sliding Window</text>\n<rect x=\"10\" y=\"32\" width=\"320\" height=\"108\" rx=\"6\" fill=\"#161B22\" stroke=\"#E3B341\"/>\n<text x=\"170\" y=\"50\" fill=\"#E3B341\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Token Bucket</text>\n<rect x=\"60\" y=\"58\" width=\"100\" height=\"55\" rx=\"4\" fill=\"#21262D\" stroke=\"#E3B341\"/>\n<text x=\"110\" y=\"74\" fill=\"#E3B341\" font-size=\"9\" text-anchor=\"middle\">bucket (cap=100)</text>\n<rect x=\"66\" y=\"79\" width=\"88\" height=\"10\" rx=\"2\" fill=\"#E3B341\" opacity=\"0.8\"/>\n<rect x=\"66\" y=\"93\" width=\"60\" height=\"10\" rx=\"2\" fill=\"#E3B341\" opacity=\"0.4\"/>\n<text x=\"110\" y=\"112\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">refills at rate</text>\n<text x=\"210\" y=\"68\" fill=\"#3FB950\" font-size=\"10\">\u2713 allows burst spending</text>\n<text x=\"210\" y=\"83\" fill=\"#3FB950\" font-size=\"10\">\u2713 idle = accumulate tokens</text>\n<text x=\"210\" y=\"98\" fill=\"#D29922\" font-size=\"10\">Use: bursty-infrequent</text>\n<text x=\"210\" y=\"113\" fill=\"#8B949E\" font-size=\"9\">e.g. batch jobs</text>\n<text x=\"170\" y=\"133\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">Guava RateLimiter.create(100.0)</text>\n<rect x=\"350\" y=\"32\" width=\"320\" height=\"108\" rx=\"6\" fill=\"#161B22\" stroke=\"#BC8CFF\"/>\n<text x=\"510\" y=\"50\" fill=\"#BC8CFF\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Sliding Window Counter</text>\n<rect x=\"360\" y=\"60\" width=\"280\" height=\"28\" rx=\"3\" fill=\"#21262D\"/>\n<rect x=\"360\" y=\"60\" width=\"130\" height=\"28\" rx=\"3\" fill=\"#BC8CFF\" opacity=\"0.3\"/>\n<text x=\"425\" y=\"78\" fill=\"#fff\" font-size=\"8\" text-anchor=\"middle\">prev window (70 reqs)</text>\n<rect x=\"490\" y=\"60\" width=\"150\" height=\"28\" rx=\"3\" fill=\"#BC8CFF\" opacity=\"0.6\"/>\n<text x=\"565\" y=\"78\" fill=\"#fff\" font-size=\"8\" text-anchor=\"middle\">current (20 reqs)</text>\n<text x=\"510\" y=\"104\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">estimate = prev\u00d7(1-t/w) + current</text>\n<text x=\"510\" y=\"118\" fill=\"#D29922\" font-size=\"10\" text-anchor=\"middle\">Use: mirror external API limits</text>\n<text x=\"510\" y=\"131\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">Redis Lua: atomic check+INCR</text>\n<rect x=\"10\" y=\"152\" width=\"660\" height=\"38\" rx=\"4\" fill=\"#161B22\" stroke=\"#30363D\"/>\n<text x=\"340\" y=\"170\" fill=\"#D29922\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Redis Lua eliminates race condition</text>\n<text x=\"340\" y=\"184\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">GET+check+INCR runs atomically \u2014 no interleave between check and increment. Redis down: fail-open (availability) vs fail-closed (protect external API) = product decision.</text>\n</svg>"}], "schema": [{"title": "Schema compatibility matrix", "svg": "<svg viewBox=\"0 0 680 215\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Inter,monospace\">\n<rect width=\"680\" height=\"215\" fill=\"#0D1117\" rx=\"8\"/>\n<text x=\"340\" y=\"20\" fill=\"#8B949E\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"600\">Schema Compatibility \u2014 What Changes Are Safe</text>\n<rect x=\"10\" y=\"30\" width=\"230\" height=\"24\" rx=\"3\" fill=\"#21262D\"/><text x=\"125\" y=\"46\" fill=\"#8B949E\" font-size=\"10\" text-anchor=\"middle\">Change type</text>\n<rect x=\"246\" y=\"30\" width=\"130\" height=\"24\" rx=\"3\" fill=\"#21262D\" stroke=\"#3FB950\"/><text x=\"311\" y=\"46\" fill=\"#3FB950\" font-size=\"10\" text-anchor=\"middle\">Backward</text>\n<rect x=\"382\" y=\"30\" width=\"130\" height=\"24\" rx=\"3\" fill=\"#21262D\" stroke=\"#2F81F7\"/><text x=\"447\" y=\"46\" fill=\"#2F81F7\" font-size=\"10\" text-anchor=\"middle\">Forward</text>\n<rect x=\"518\" y=\"30\" width=\"152\" height=\"24\" rx=\"3\" fill=\"#21262D\" stroke=\"#BC8CFF\"/><text x=\"594\" y=\"46\" fill=\"#BC8CFF\" font-size=\"10\" text-anchor=\"middle\">Full (both)</text>\n<rect x=\"10\" y=\"58\" width=\"230\" height=\"22\" rx=\"2\" fill=\"#161B22\"/><text x=\"125\" y=\"73\" fill=\"#E6EDF3\" font-size=\"9\" text-anchor=\"middle\">Add optional field (with default)</text>\n<rect x=\"246\" y=\"58\" width=\"130\" height=\"22\" rx=\"2\" fill=\"#0D3F1F\"/><text x=\"311\" y=\"74\" fill=\"#3FB950\" font-size=\"14\" text-anchor=\"middle\">\u2713</text>\n<rect x=\"382\" y=\"58\" width=\"130\" height=\"22\" rx=\"2\" fill=\"#0D3F1F\"/><text x=\"447\" y=\"74\" fill=\"#3FB950\" font-size=\"14\" text-anchor=\"middle\">\u2713</text>\n<rect x=\"518\" y=\"58\" width=\"152\" height=\"22\" rx=\"2\" fill=\"#0D3F1F\"/><text x=\"594\" y=\"74\" fill=\"#3FB950\" font-size=\"14\" text-anchor=\"middle\">\u2713</text>\n<rect x=\"10\" y=\"84\" width=\"230\" height=\"22\" rx=\"2\" fill=\"#161B22\"/><text x=\"125\" y=\"99\" fill=\"#E6EDF3\" font-size=\"9\" text-anchor=\"middle\">Remove optional field</text>\n<rect x=\"246\" y=\"84\" width=\"130\" height=\"22\" rx=\"2\" fill=\"#0D3F1F\"/><text x=\"311\" y=\"100\" fill=\"#3FB950\" font-size=\"14\" text-anchor=\"middle\">\u2713</text>\n<rect x=\"382\" y=\"84\" width=\"130\" height=\"22\" rx=\"2\" fill=\"#3F1B1B\"/><text x=\"447\" y=\"100\" fill=\"#F85149\" font-size=\"14\" text-anchor=\"middle\">\u2717</text>\n<rect x=\"518\" y=\"84\" width=\"152\" height=\"22\" rx=\"2\" fill=\"#3F1B1B\"/><text x=\"594\" y=\"100\" fill=\"#F85149\" font-size=\"14\" text-anchor=\"middle\">\u2717</text>\n<rect x=\"10\" y=\"110\" width=\"230\" height=\"22\" rx=\"2\" fill=\"#161B22\"/><text x=\"125\" y=\"125\" fill=\"#E6EDF3\" font-size=\"9\" text-anchor=\"middle\">Add required field</text>\n<rect x=\"246\" y=\"110\" width=\"130\" height=\"22\" rx=\"2\" fill=\"#3F1B1B\"/><text x=\"311\" y=\"126\" fill=\"#F85149\" font-size=\"14\" text-anchor=\"middle\">\u2717</text>\n<rect x=\"382\" y=\"110\" width=\"130\" height=\"22\" rx=\"2\" fill=\"#0D3F1F\"/><text x=\"447\" y=\"126\" fill=\"#3FB950\" font-size=\"14\" text-anchor=\"middle\">\u2713</text>\n<rect x=\"518\" y=\"110\" width=\"152\" height=\"22\" rx=\"2\" fill=\"#3F1B1B\"/><text x=\"594\" y=\"126\" fill=\"#F85149\" font-size=\"14\" text-anchor=\"middle\">\u2717</text>\n<rect x=\"10\" y=\"136\" width=\"230\" height=\"22\" rx=\"2\" fill=\"#161B22\"/><text x=\"125\" y=\"151\" fill=\"#E6EDF3\" font-size=\"9\" text-anchor=\"middle\">Rename or change field type</text>\n<rect x=\"246\" y=\"136\" width=\"130\" height=\"22\" rx=\"2\" fill=\"#3F1B1B\"/><text x=\"311\" y=\"152\" fill=\"#F85149\" font-size=\"14\" text-anchor=\"middle\">\u2717</text>\n<rect x=\"382\" y=\"136\" width=\"130\" height=\"22\" rx=\"2\" fill=\"#3F1B1B\"/><text x=\"447\" y=\"152\" fill=\"#F85149\" font-size=\"14\" text-anchor=\"middle\">\u2717</text>\n<rect x=\"518\" y=\"136\" width=\"152\" height=\"22\" rx=\"2\" fill=\"#3F1B1B\"/><text x=\"594\" y=\"152\" fill=\"#F85149\" font-size=\"14\" text-anchor=\"middle\">\u2717</text>\n<rect x=\"10\" y=\"172\" width=\"660\" height=\"34\" rx=\"4\" fill=\"#161B22\" stroke=\"#BC8CFF\"/>\n<text x=\"340\" y=\"189\" fill=\"#BC8CFF\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Golden rule: only add optional fields with defaults for full compatibility</text>\n<text x=\"340\" y=\"203\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">Avro/Protobuf schema registries enforce this at registration time \u2014 incompatible schemas are rejected before any producer can publish</text>\n</svg>"}], "observability": [{"title": "Distributed trace propagation through async services", "svg": "<svg viewBox=\"0 0 680 210\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Inter,monospace\">\n<rect width=\"680\" height=\"210\" fill=\"#0D1117\" rx=\"8\"/>\n<text x=\"340\" y=\"20\" fill=\"#8B949E\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"600\">Distributed Trace Propagation \u2014 Event-Driven Services</text>\n<rect x=\"10\" y=\"35\" width=\"108\" height=\"52\" rx=\"6\" fill=\"#161B22\" stroke=\"#39D353\" stroke-width=\"1.5\"/>\n<text x=\"64\" y=\"53\" fill=\"#39D353\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Service A</text>\n<text x=\"64\" y=\"67\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">trace: abc123</text>\n<text x=\"64\" y=\"80\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">span: s001 (root)</text>\n<rect x=\"140\" y=\"40\" width=\"130\" height=\"42\" rx=\"4\" fill=\"#21262D\" stroke=\"#2F81F7\"/>\n<text x=\"205\" y=\"57\" fill=\"#2F81F7\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">Kafka headers</text>\n<text x=\"205\" y=\"72\" fill=\"#D29922\" font-size=\"8\" text-anchor=\"middle\">traceparent: 00-abc123-s001-01</text>\n<line x1=\"118\" y1=\"61\" x2=\"138\" y2=\"61\" stroke=\"#39D353\" stroke-width=\"1.5\" marker-end=\"url(#t1)\"/>\n<line x1=\"270\" y1=\"61\" x2=\"288\" y2=\"61\" stroke=\"#39D353\" stroke-width=\"1.5\" marker-end=\"url(#t1)\"/>\n<rect x=\"290\" y=\"35\" width=\"108\" height=\"52\" rx=\"6\" fill=\"#161B22\" stroke=\"#39D353\" stroke-width=\"1.5\"/>\n<text x=\"344\" y=\"53\" fill=\"#39D353\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Service B</text>\n<text x=\"344\" y=\"67\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">trace: abc123 (same)</text>\n<text x=\"344\" y=\"80\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">span: s002, parent: s001</text>\n<rect x=\"420\" y=\"40\" width=\"130\" height=\"42\" rx=\"4\" fill=\"#21262D\" stroke=\"#2F81F7\"/>\n<text x=\"485\" y=\"57\" fill=\"#2F81F7\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">SQS attributes</text>\n<text x=\"485\" y=\"72\" fill=\"#D29922\" font-size=\"8\" text-anchor=\"middle\">traceparent: 00-abc123-s002-01</text>\n<line x1=\"398\" y1=\"61\" x2=\"418\" y2=\"61\" stroke=\"#39D353\" stroke-width=\"1.5\" marker-end=\"url(#t1)\"/>\n<line x1=\"550\" y1=\"61\" x2=\"568\" y2=\"61\" stroke=\"#39D353\" stroke-width=\"1.5\" marker-end=\"url(#t1)\"/>\n<rect x=\"570\" y=\"35\" width=\"100\" height=\"52\" rx=\"6\" fill=\"#161B22\" stroke=\"#39D353\" stroke-width=\"1.5\"/>\n<text x=\"620\" y=\"53\" fill=\"#39D353\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Service C</text>\n<text x=\"620\" y=\"67\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">trace: abc123</text>\n<text x=\"620\" y=\"80\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">span: s003</text>\n<rect x=\"10\" y=\"102\" width=\"660\" height=\"46\" rx=\"6\" fill=\"#161B22\" stroke=\"#30363D\"/>\n<text x=\"340\" y=\"120\" fill=\"#39D353\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Trace tree in Jaeger/Datadog (all under traceId: abc123)</text>\n<rect x=\"20\" y=\"126\" width=\"140\" height=\"16\" rx=\"3\" fill=\"#21262D\" stroke=\"#39D353\"/><text x=\"90\" y=\"138\" fill=\"#39D353\" font-size=\"8\" text-anchor=\"middle\">A: s001 (root) 50ms</text>\n<rect x=\"168\" y=\"126\" width=\"155\" height=\"16\" rx=\"3\" fill=\"#21262D\" stroke=\"#2F81F7\"/><text x=\"245\" y=\"138\" fill=\"#2F81F7\" font-size=\"8\" text-anchor=\"middle\">B: s002 parent=s001 80ms</text>\n<rect x=\"331\" y=\"126\" width=\"140\" height=\"16\" rx=\"3\" fill=\"#21262D\" stroke=\"#BC8CFF\"/><text x=\"401\" y=\"138\" fill=\"#BC8CFF\" font-size=\"8\" text-anchor=\"middle\">C: s003 parent=s002 40ms</text>\n<text x=\"530\" y=\"138\" fill=\"#8B949E\" font-size=\"8\">total: 170ms</text>\n<rect x=\"10\" y=\"158\" width=\"660\" height=\"42\" rx=\"4\" fill=\"#21262D\"/>\n<text x=\"340\" y=\"174\" fill=\"#D29922\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">W3C traceparent: 00-{traceId 32hex}-{parentId 16hex}-{flags 01=sampled}</text>\n<text x=\"340\" y=\"188\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">OpenTelemetry auto-instruments Kafka and SQS clients \u2014 inject on produce, extract on consume automatically</text>\n<text x=\"340\" y=\"200\" fill=\"#F85149\" font-size=\"8\" text-anchor=\"middle\">Missing propagation at ONE service severs the trace chain \u2014 use auto-instrumentation, never rely on manual injection</text>\n<defs>\n<marker id=\"t1\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#39D353\"/></marker>\n</defs>\n</svg>"}], "async": [{"title": "Correlation ID pattern \u2014 request-response over a queue", "svg": "<svg viewBox=\"0 0 680 195\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Inter,monospace\">\n<rect width=\"680\" height=\"195\" fill=\"#0D1117\" rx=\"8\"/>\n<text x=\"340\" y=\"20\" fill=\"#8B949E\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"600\">Correlation ID Pattern \u2014 Request-Response Over Queue</text>\n<rect x=\"10\" y=\"35\" width=\"90\" height=\"50\" rx=\"6\" fill=\"#161B22\" stroke=\"#3FB950\" stroke-width=\"1.5\"/>\n<text x=\"55\" y=\"53\" fill=\"#3FB950\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Client</text>\n<text x=\"55\" y=\"67\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">Map&lt;corrId,</text>\n<text x=\"55\" y=\"79\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">CompletableFuture&gt;</text>\n<rect x=\"138\" y=\"35\" width=\"120\" height=\"28\" rx=\"4\" fill=\"#161B22\" stroke=\"#2F81F7\"/><text x=\"198\" y=\"53\" fill=\"#2F81F7\" font-size=\"10\" text-anchor=\"middle\">Request Queue</text>\n<rect x=\"298\" y=\"35\" width=\"90\" height=\"50\" rx=\"6\" fill=\"#161B22\" stroke=\"#BC8CFF\" stroke-width=\"1.5\"/>\n<text x=\"343\" y=\"53\" fill=\"#BC8CFF\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">Server</text>\n<text x=\"343\" y=\"67\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">process</text>\n<text x=\"343\" y=\"79\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">request</text>\n<rect x=\"138\" y=\"118\" width=\"120\" height=\"28\" rx=\"4\" fill=\"#161B22\" stroke=\"#D29922\"/><text x=\"198\" y=\"136\" fill=\"#D29922\" font-size=\"10\" text-anchor=\"middle\">Reply Queue</text>\n<line x1=\"100\" y1=\"49\" x2=\"136\" y2=\"49\" stroke=\"#2F81F7\" stroke-width=\"1.5\" marker-end=\"url(#ac1)\"/>\n<text x=\"118\" y=\"44\" fill=\"#8B949E\" font-size=\"7\">1. send(corrId+replyTo)</text>\n<line x1=\"258\" y1=\"49\" x2=\"296\" y2=\"49\" stroke=\"#2F81F7\" stroke-width=\"1.5\" marker-end=\"url(#ac1)\"/>\n<text x=\"277\" y=\"44\" fill=\"#8B949E\" font-size=\"7\">2. consume</text>\n<line x1=\"343\" y1=\"85\" x2=\"265\" y2=\"118\" stroke=\"#D29922\" stroke-width=\"1.5\" marker-end=\"url(#ac2)\"/>\n<text x=\"325\" y=\"108\" fill=\"#D29922\" font-size=\"7\">3. publish(corrId+result)</text>\n<line x1=\"138\" y1=\"132\" x2=\"100\" y2=\"75\" stroke=\"#D29922\" stroke-width=\"1.5\" marker-end=\"url(#ac3)\"/>\n<text x=\"95\" y=\"108\" fill=\"#3FB950\" font-size=\"7\" text-anchor=\"middle\">4. match corrId</text>\n<text x=\"95\" y=\"118\" fill=\"#3FB950\" font-size=\"7\" text-anchor=\"middle\">complete(result)</text>\n<rect x=\"436\" y=\"32\" width=\"234\" height=\"98\" rx=\"6\" fill=\"#161B22\" stroke=\"#30363D\"/>\n<text x=\"553\" y=\"50\" fill=\"#8B949E\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">Key design points</text>\n<text x=\"446\" y=\"65\" fill=\"#8B949E\" font-size=\"9\">One reply queue per client (not per request)</text>\n<text x=\"446\" y=\"79\" fill=\"#8B949E\" font-size=\"9\">corrId = UUID = also the trace ID</text>\n<text x=\"446\" y=\"93\" fill=\"#D29922\" font-size=\"9\">CompletableFuture.orTimeout(30s)</text>\n<text x=\"446\" y=\"107\" fill=\"#D29922\" font-size=\"9\">timeout removes map entry (no leak)</text>\n<text x=\"446\" y=\"121\" fill=\"#8B949E\" font-size=\"8\">Adds ~1 hop latency vs REST</text>\n<text x=\"446\" y=\"131\" fill=\"#8B949E\" font-size=\"8\">corrId (business) != msg ID (transport)</text>\n<rect x=\"10\" y=\"158\" width=\"660\" height=\"28\" rx=\"4\" fill=\"#21262D\"/>\n<text x=\"340\" y=\"172\" fill=\"#8B949E\" font-size=\"9\" text-anchor=\"middle\">Client crash before receiving: response orphaned in reply queue. Caller timed out \u2192 retries original request (must be idempotent).</text>\n<text x=\"340\" y=\"184\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">EIP name: Request-Reply pattern. corrId is the Correlation Identifier. replyTo is the Return Address.</text>\n<defs>\n<marker id=\"ac1\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#2F81F7\"/></marker>\n<marker id=\"ac2\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#D29922\"/></marker>\n<marker id=\"ac3\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#3FB950\"/></marker>\n</defs>\n</svg>"}], "realworld": [{"title": "Poison pill \u2014 detection, partition unblocking, DLQ contents", "svg": "<svg viewBox=\"0 0 680 230\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Inter,monospace\">\n<rect width=\"680\" height=\"230\" fill=\"#0D1117\" rx=\"8\"/>\n<text x=\"340\" y=\"20\" fill=\"#8B949E\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"600\">Poison Pill \u2014 Detection and Handling</text>\n<rect x=\"10\" y=\"35\" width=\"90\" height=\"28\" rx=\"4\" fill=\"#161B22\" stroke=\"#2F81F7\"/><text x=\"55\" y=\"53\" fill=\"#2F81F7\" font-size=\"10\" text-anchor=\"middle\">Source Queue</text>\n<rect x=\"140\" y=\"35\" width=\"90\" height=\"28\" rx=\"4\" fill=\"#161B22\" stroke=\"#BC8CFF\"/><text x=\"185\" y=\"53\" fill=\"#BC8CFF\" font-size=\"10\" text-anchor=\"middle\">Consumer</text>\n<line x1=\"100\" y1=\"49\" x2=\"138\" y2=\"49\" stroke=\"#2F81F7\" stroke-width=\"1.5\" marker-end=\"url(#pp1)\"/>\n<rect x=\"275\" y=\"30\" width=\"140\" height=\"38\" rx=\"4\" fill=\"#21262D\" stroke=\"#D29922\"/>\n<text x=\"345\" y=\"46\" fill=\"#D29922\" font-size=\"10\" text-anchor=\"middle\" font-weight=\"600\">Failure Counter</text>\n<text x=\"345\" y=\"61\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">Redis: msgId \u2192 {count, exceptions}</text>\n<line x1=\"230\" y1=\"49\" x2=\"273\" y2=\"49\" stroke=\"#D29922\" stroke-width=\"1\" marker-end=\"url(#pp2)\"/>\n<rect x=\"460\" y=\"30\" width=\"110\" height=\"38\" rx=\"4\" fill=\"#21262D\" stroke=\"#BC8CFF\"/>\n<text x=\"515\" y=\"46\" fill=\"#BC8CFF\" font-size=\"10\" text-anchor=\"middle\">count &gt;= 5?</text>\n<text x=\"515\" y=\"61\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">same exception?</text>\n<line x1=\"415\" y1=\"49\" x2=\"458\" y2=\"49\" stroke=\"#BC8CFF\" stroke-width=\"1\" marker-end=\"url(#pp3)\"/>\n<rect x=\"606\" y=\"30\" width=\"64\" height=\"38\" rx=\"4\" fill=\"#21262D\" stroke=\"#3FB950\"/>\n<text x=\"638\" y=\"48\" fill=\"#3FB950\" font-size=\"9\" text-anchor=\"middle\">NO</text>\n<text x=\"638\" y=\"62\" fill=\"#8B949E\" font-size=\"8\" text-anchor=\"middle\">retry</text>\n<line x1=\"570\" y1=\"49\" x2=\"604\" y2=\"49\" stroke=\"#3FB950\" stroke-width=\"1\" marker-end=\"url(#pp4)\"/>\n<rect x=\"275\" y=\"98\" width=\"130\" height=\"28\" rx=\"4\" fill=\"#161B22\" stroke=\"#F85149\"/>\n<text x=\"340\" y=\"116\" fill=\"#F85149\" font-size=\"10\" text-anchor=\"middle\">Dead Letter Queue</text>\n<line x1=\"515\" y1=\"68\" x2=\"406\" y2=\"98\" stroke=\"#F85149\" stroke-width=\"1.5\" marker-end=\"url(#pp5)\"/>\n<text x=\"465\" y=\"90\" fill=\"#F85149\" font-size=\"8\">YES \u2192 DLQ</text>\n<rect x=\"440\" y=\"98\" width=\"230\" height=\"28\" rx=\"4\" fill=\"#21262D\" stroke=\"#D29922\"/>\n<text x=\"555\" y=\"112\" fill=\"#D29922\" font-size=\"9\" text-anchor=\"middle\">Kafka: seek(partition, offset+1)</text>\n<text x=\"555\" y=\"122\" fill=\"#8B949E\" font-size=\"7\" text-anchor=\"middle\">\u2192 unblocks partition immediately</text>\n<line x1=\"405\" y1=\"112\" x2=\"438\" y2=\"112\" stroke=\"#D29922\" stroke-width=\"1\" marker-end=\"url(#pp2)\"/>\n<rect x=\"10\" y=\"144\" width=\"660\" height=\"76\" rx=\"6\" fill=\"#161B22\" stroke=\"#30363D\"/>\n<text x=\"340\" y=\"162\" fill=\"#D29922\" font-size=\"11\" text-anchor=\"middle\" font-weight=\"600\">DLQ message must contain</text>\n<text x=\"20\" y=\"178\" fill=\"#8B949E\" font-size=\"9\">Raw payload bytes (exact) \u00b7 Exception class + stack trace per attempt \u00b7 Timestamp per attempt</text>\n<text x=\"20\" y=\"193\" fill=\"#8B949E\" font-size=\"9\">Consumer version + instance ID \u00b7 Original topic/partition/offset (Kafka) or queue URL/msgId (SQS) \u00b7 Attempt count</text>\n<text x=\"20\" y=\"208\" fill=\"#3FB950\" font-size=\"9\">Distinguish: PERMANENT (same exception every time) vs TRANSIENT (different exceptions, resolves during backoff)</text>\n<text x=\"20\" y=\"216\" fill=\"#8B949E\" font-size=\"8\">Store DLQ in queryable format (Elasticsearch / S3+Athena). Test: synthetic poison pill in CI + chaos flag in staging.</text>\n<defs>\n<marker id=\"pp1\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#2F81F7\"/></marker>\n<marker id=\"pp2\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#D29922\"/></marker>\n<marker id=\"pp3\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#BC8CFF\"/></marker>\n<marker id=\"pp4\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#3FB950\"/></marker>\n<marker id=\"pp5\" markerWidth=\"6\" markerHeight=\"5\" refX=\"6\" refY=\"2.5\" orient=\"auto\"><polygon points=\"0 0,6 2.5,0 5\" fill=\"#F85149\"/></marker>\n</defs>\n</svg>"}]};
var NC=new Set(['backpressure','schema','observability','async','realworld']);
var ac='all',oc={},fc={},rv={},hr=false,ho=false;

function bsb(){
  var cats=Object.keys(CM);
  var h='<span class="sbl">Filter</span>';
  h+='<button class="sbi active" onclick="sc(\'all\',this)" id="sb-all"><span class="sdot" style="background:#8B949E"></span>All<span class="scnt">'+QS.length+'</span></button>';
  h+='<span class="sbl">Category</span>';
  cats.forEach(function(c){
    var m=CM[c],n=QS.filter(function(q){return q.cat===c;}).length;
    h+='<button class="sbi" onclick="sc(\''+c+'\',this)" id="sb-'+c+'"><span class="sdot" style="background:'+m.dot+'"></span>'+m.label+(m.isNew?' <span style="font-size:9px;color:#BC8CFF">new</span>':'')+'<span class="scnt">'+n+'</span></button>';
  });
  document.getElementById('sb').innerHTML=h;
}

function sc(c,el){
  ac=c;
  document.querySelectorAll('.sbi').forEach(function(b){b.classList.remove('active');});
  (el||document.getElementById('sb-'+c)).classList.add('active');
  rl();
}

function thr(){hr=!hr;document.getElementById('btn-hr').classList.toggle('on',hr);rl();}
function tho(){ho=!ho;document.getElementById('btn-ho').classList.toggle('on',ho);rl();}
function ea(){gf().forEach(function(q){oc[q.id]=true;rv[q.id]=true;});up();rl();}
function ca(){oc={};rl();}

function tc(id){
  if(oc[id])delete oc[id]; else{oc[id]=true;rv[id]=true;}
  up();rl();
}

function tf(cid,fi){
  var k=cid+'-'+fi;
  if(fc[k])delete fc[k]; else fc[k]=true;
  rl();
}

function mr(id,e){e.stopPropagation();rv[id]=true;up();rl();}

function up(){
  var t=QS.length,d=Object.keys(rv).length,p=Math.round(d/t*100);
  document.getElementById('pf').style.width=p+'%';
  document.getElementById('pc').textContent=d+' / '+t;
  document.getElementById('s-rev').textContent=d;
}

function gf(){
  var q=document.getElementById('srch').value.toLowerCase();
  return QS.filter(function(item){
    if(ac!=='all'&&item.cat!==ac)return false;
    if(hr&&rv[item.id])return false;
    if(ho&&item.diff!=='hard')return false;
    if(q&&!item.title.toLowerCase().includes(q)&&!CM[item.cat].label.toLowerCase().includes(q))return false;
    return true;
  });
}

function rl(){
  var items=gf();
  document.getElementById('s-show').textContent=items.length;
  document.getElementById('s-hard').textContent=QS.filter(function(q){return q.diff==='hard';}).length;
  if(!items.length){
    document.getElementById('ql').innerHTML='<div class="empty"><div class="empty-n">&#8856;</div><div class="empty-t">No questions match</div><div>Try a different filter or clear the search</div></div>';
    return;
  }
  var h='';
  items.forEach(function(q){
    var io=!!oc[q.id],ir=!!rv[q.id];
    var cl=CM[q.cat].label,dl=q.diff==='hard'?'Hard':'Medium';
    h+='<div class="qc'+(ir?' rev':'')+'" id="qc-'+q.id+'">';
    h+='<div class="qh" onclick="tc('+q.id+')">';
    h+='<div class="qn">Q'+String(q.id).padStart(2,'0')+'</div>';
    h+='<div class="qcnt"><div class="qt">'+q.title+'</div>';
    h+='<div class="qtags"><span class="tag t-'+q.cat+'">'+cl+'</span><span class="tag t-'+q.diff+'">'+dl+'</span>';
    if(ir)h+='<span class="tag t-rev">Reviewed</span>';
    if(NC.has(q.cat))h+='<span class="tag t-new">new</span>';
    h+='</div></div>';
    h+='<span class="qchev">'+(io?'&#9650;':'&#9660;')+'</span>';
    h+='</div>';
    if(io){
      h+='<div class="qb">';
      h+='<div class="blbl">Strong-hire answer</div><div class="abx">'+q.answer+'</div>';
      h+='<div class="blbl">Trade-off to deliver proactively</div><div class="tbx">'+q.tradeoff+'</div>';
      h+='<div class="blbl">Expected follow-ups — click to expand answer</div>';
      h+='<div class="fql">';
      (q.fq||[]).forEach(function(fq,i){
        var k=q.id+'-'+i,io2=!!fc[k];
        var fa=q.fqa&&q.fqa[i]?q.fqa[i]:'';
        h+='<div class="fqi">';
        h+='<div class="fqh" onclick="tf('+q.id+','+i+')">';
        h+='<span class="fqa-arr">&#8594;</span><span class="fqq">'+fq+'</span>';
        h+='<span class="fqchev" style="'+(io2?'transform:rotate(90deg)':'')+'">&#9658;</span>';
        h+='</div>';
        if(io2&&fa)h+='<div class="fqans">'+fa+'</div>';
        h+='</div>';
      });
      h+='</div>';
      var diags=(DG[q.cat]||[]);
      if(diags.length){
        h+='<div class="blbl">Visual diagrams</div><div class="diag-grid">';
        diags.forEach(function(d){
          h+='<div class="diag-card"><div class="diag-title">'+d.title+'</div>'+d.svg+'</div>';
        });
        h+='</div>';
      }
      h+='<div class="bact">';
      if(!ir)h+='<button class="abtn abtn-g" onclick="mr('+q.id+',event)">&#10003; Mark reviewed</button>';
      h+='<button class="abtn abtn-n" onclick="tc('+q.id+')">&#8593; Collapse</button>';
      h+='</div></div>';
    }
    h+='</div>';
  });
  document.getElementById('ql').innerHTML=h;
}

document.getElementById('srch').addEventListener('input',rl);
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.key==='/'||e.key==='f'){e.preventDefault();document.getElementById('srch').focus();}
  if(e.key==='Escape'){document.getElementById('srch').value='';rl();}
  if(e.key==='h'||e.key==='H')tho();
  if(e.key==='r'||e.key==='R')thr();
});

bsb();rl();
</script>
</body>
</html>
